name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version_check:
    name: Detect version change
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.compare.outputs.version_changed }}
      marketing_version: ${{ steps.current.outputs.marketing_version }}
      build_version: ${{ steps.current.outputs.build_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: current
        shell: bash
        run: |
          extract_setting() {
            local key="$1"
            grep -m1 "${key} = " Primuse.xcodeproj/project.pbxproj | sed -E "s/.*${key} = ([^;]+);/\\1/"
          }

          marketing_version="$(extract_setting MARKETING_VERSION)"
          build_version="$(extract_setting CURRENT_PROJECT_VERSION)"

          if [[ -z "$marketing_version" || -z "$build_version" ]]; then
            echo "::error::Failed to read app version from Primuse.xcodeproj/project.pbxproj"
            exit 1
          fi

          echo "marketing_version=$marketing_version" >> "$GITHUB_OUTPUT"
          echo "build_version=$build_version" >> "$GITHUB_OUTPUT"
          echo "Current version: $marketing_version ($build_version)"

      - name: Compare with base commit
        id: compare
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CURRENT_MARKETING_VERSION: ${{ steps.current.outputs.marketing_version }}
          CURRENT_BUILD_VERSION: ${{ steps.current.outputs.build_version }}
        run: |
          extract_setting_from_ref() {
            local ref="$1"
            local key="$2"
            git show "${ref}:Primuse.xcodeproj/project.pbxproj" | grep -m1 "${key} = " | sed -E "s/.*${key} = ([^;]+);/\\1/"
          }

          base_ref=""
          if [[ "$EVENT_NAME" == "pull_request" && -n "$BASE_SHA" ]]; then
            base_ref="$BASE_SHA"
          elif [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            base_ref="$BEFORE_SHA"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            base_ref="HEAD^"
          fi

          if [[ -z "$base_ref" ]]; then
            echo "No base commit available; enabling archive job."
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_marketing_version="$(extract_setting_from_ref "$base_ref" MARKETING_VERSION)"
          base_build_version="$(extract_setting_from_ref "$base_ref" CURRENT_PROJECT_VERSION)"

          if [[ -z "$base_marketing_version" || -z "$base_build_version" ]]; then
            echo "Base version could not be read cleanly; enabling archive job."
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Base version: $base_marketing_version ($base_build_version)"

          if [[ "$CURRENT_MARKETING_VERSION" != "$base_marketing_version" || "$CURRENT_BUILD_VERSION" != "$base_build_version" ]]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed."
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged."
          fi

  build:
    name: Build (iOS)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version
          echo "Available simulators:"
          xcodebuild -showsdks | grep -i ios

      # AppSecrets.swift 在 .gitignore 内不入仓库 (持有第三方 API key /
      # 解密参数), CI 没这个文件直接 build 失败。从 example 复制一份
      # 空 stub, 让 build 通过。CI 产物里所有依赖 secret 的功能都
      # fallback 到「让用户自己配」, 不影响其他流程。
      - name: Stub AppSecrets for CI
        run: |
          cp Primuse/Services/Scrobble/AppSecrets.example.swift \
             Primuse/Services/Scrobble/AppSecrets.swift

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme Primuse \
            -project Primuse.xcodeproj

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -scheme Primuse \
            -project Primuse.xcodeproj \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | xcpretty --color || true

          # Check exit code from xcodebuild (not xcpretty)
          exit ${PIPESTATUS[0]}

  archive:
    name: Archive (unsigned IPA)
    runs-on: macos-15
    timeout-minutes: 30
    needs: [version_check, build]
    if: github.ref == 'refs/heads/main' && needs.version_check.outputs.version_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Stub AppSecrets for CI
        run: |
          cp Primuse/Services/Scrobble/AppSecrets.example.swift \
             Primuse/Services/Scrobble/AppSecrets.swift

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme Primuse \
            -project Primuse.xcodeproj

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme Primuse \
            -project Primuse.xcodeproj \
            -destination 'generic/platform=iOS' \
            -archivePath build/Primuse.xcarchive \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_ENTITLEMENTS="" \
            | xcpretty --color || true

          exit ${PIPESTATUS[0]}

      - name: Export unsigned app
        run: |
          mkdir -p build/Payload
          cp -r build/Primuse.xcarchive/Products/Applications/Primuse.app build/Payload/
          cd build && zip -r Primuse-unsigned.ipa Payload
          echo "IPA size: $(du -h Primuse-unsigned.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Primuse-${{ needs.version_check.outputs.marketing_version }}-${{ needs.version_check.outputs.build_version }}-unsigned
          path: build/Primuse-unsigned.ipa
          retention-days: 30
